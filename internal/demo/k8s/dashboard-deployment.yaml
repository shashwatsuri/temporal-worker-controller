apiVersion: v1
kind: ServiceAccount
metadata:
  name: rainbow-dashboard-api
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rainbow-dashboard-api
rules:
  - apiGroups: ["temporal.io"]
    resources: ["temporalworkerdeployments", "temporalconnections"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services", "services/proxy"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rainbow-dashboard-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rainbow-dashboard-api
subjects:
  - kind: ServiceAccount
    name: rainbow-dashboard-api
    namespace: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rainbow-dashboard-api
  namespace: default
  labels:
    app: rainbow-dashboard-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rainbow-dashboard-api
  template:
    metadata:
      labels:
        app: rainbow-dashboard-api
    spec:
      serviceAccountName: rainbow-dashboard-api
      containers:
        - name: api
          image: 025066239481.dkr.ecr.us-east-2.amazonaws.com/rainbow-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - "--namespace"
            - "$(NAMESPACE)"
            - "--name"
            - "helloworld"
            - "--port"
            - "8787"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rainbow-dashboard-api
  namespace: default
  labels:
    app: rainbow-dashboard-api
spec:
  type: ClusterIP
  ports:
    - port: 8787
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: rainbow-dashboard-api

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rainbow-dashboard-ui-nginx
  namespace: default
data:
  default.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      location /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rainbow-dashboard-ui
  namespace: default
  labels:
    app: rainbow-dashboard-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rainbow-dashboard-ui
  template:
    metadata:
      labels:
        app: rainbow-dashboard-ui
    spec:
      containers:
        - name: ui
          image: 025066239481.dkr.ecr.us-east-2.amazonaws.com/rainbow-dashboard-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: rainbow-dashboard-ui-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: rainbow-dashboard-ui
  namespace: default
  labels:
    app: rainbow-dashboard-ui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: rainbow-dashboard-ui

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rainbow-dashboard
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Set this to your ACM certificate ARN before applying.
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-2:025066239481:certificate/f1084339-83cd-471a-964a-877799ef8239"
    alb.ingress.kubernetes.io/subnets: subnet-020cbb1d237801119,subnet-0c6238d501a8f9328
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30,load_balancing.cross_zone.enabled=true
spec:
  ingressClassName: alb
  rules:
    - host: replay-demo.bitovi.com
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: helloworld-worker-metrics
                port:
                  number: 9090
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rainbow-dashboard-api
                port:
                  number: 8787
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rainbow-dashboard-ui
                port:
                  number: 80
