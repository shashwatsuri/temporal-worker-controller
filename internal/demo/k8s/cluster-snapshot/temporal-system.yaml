apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    meta.helm.sh/release-name: temporal-worker-controller
    meta.helm.sh/release-namespace: temporal-system
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/instance: temporal-worker-controller
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: temporal-worker-controller
    app.kubernetes.io/version: 1.5.1
    skaffold.dev/run-id: 9fe9bb95-f75a-45d2-89bd-b7e98892ede5
  name: temporal-worker-controller-manager
  namespace: temporal-system
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: temporal-worker-controller
      app.kubernetes.io/name: temporal-worker-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/instance: temporal-worker-controller
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: temporal-worker-controller
        app.kubernetes.io/version: 1.5.1
        skaffold.dev/run-id: 9fe9bb95-f75a-45d2-89bd-b7e98892ede5
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: temporal-worker-controller
                  app.kubernetes.io/name: temporal-worker-controller
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - --leader-elect
        - --metrics-bind-address=127.0.0.1:8080
        - --health-probe-bind-address=:8081
        env:
        - name: CONTROLLER_IDENTITY
          value: temporal-worker-controller/temporal-system
        - name: CONTROLLER_VERSION
          value: latest
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: SERVICE_ACCOUNT_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.serviceAccountName
        - name: ALLOWED_KINDS
          value: HorizontalPodAutoscaler
        image: temporal-worker-controller:9cad33afe7ad17e1fd6ee46beefd01b56dd2b67618e6ba73448ff77e22a4637e
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      - args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --v=0
        image: registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.14.1
        imagePullPolicy: IfNotPresent
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsNonRoot: true
      serviceAccount: temporal-worker-controller-service-account
      serviceAccountName: temporal-worker-controller-service-account
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
