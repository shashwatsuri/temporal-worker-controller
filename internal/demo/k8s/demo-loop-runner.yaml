---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rainbow-demo-runner
  namespace: __NAMESPACE__
  annotations:
    eks.amazonaws.com/role-arn: "__AWS_ROLE_ARN__"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rainbow-demo-runner
  namespace: __NAMESPACE__
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "pods/log", "secrets", "services", "serviceaccounts", "nodes"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["temporal.io"]
    resources: ["temporalconnections", "temporalworkerdeployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rainbow-demo-runner
  namespace: __NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rainbow-demo-runner
subjects:
  - kind: ServiceAccount
    name: rainbow-demo-runner
    namespace: __NAMESPACE__

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rainbow-demo-runner
  namespace: __NAMESPACE__
  labels:
    app: rainbow-demo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rainbow-demo-runner
  template:
    metadata:
      labels:
        app: rainbow-demo-runner
    spec:
      serviceAccountName: rainbow-demo-runner
      restartPolicy: Always
      containers:
        - name: demo-runner
          image: __RUNNER_IMAGE__
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["/opt/release-scripts/demo_loop.sh"]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RELEASE_NAME
              value: "__RELEASE_NAME__"
            - name: REPO_URL
              value: "__REPO_URL__"
            - name: REPO_REF
              value: "__REPO_REF__"
            - name: WORKER
              value: "__WORKER__"
            - name: CONFIG_MAP_NAME
              value: "__STATE_CONFIGMAP__"
            - name: AWS_REGION
              value: "__AWS_REGION__"
            - name: WAIT_FOR_TWD_ROLLOUT
              value: "__WAIT_FOR_TWD_ROLLOUT__"
            - name: LOOP_INTERVAL_SECONDS
              value: "__LOOP_INTERVAL_SECONDS__"
            - name: TEMPORAL_ADDRESS
              value: "__TEMPORAL_ADDRESS__"
            - name: TEMPORAL_NAMESPACE
              value: "__TEMPORAL_NAMESPACE__"
            - name: TEMPORAL_TASK_QUEUE
              value: "__TEMPORAL_TASK_QUEUE__"
            - name: TEMPORAL_WORKER_DEPLOYMENT
              value: "__NAMESPACE__/__RELEASE_NAME__"
            - name: WORKFLOWS_PER_RUN
              value: "__WORKFLOWS_PER_RUN__"
            - name: MAX_NEW_WORKFLOWS_PER_RUN
              value: "__MAX_NEW_WORKFLOWS_PER_RUN__"
            - name: MAX_RUNNING_WORKFLOWS
              value: "__MAX_RUNNING_WORKFLOWS__"
            - name: WORKFLOW_TYPE
              value: "HelloWorld"
            - name: CONTINUE_ON_RELEASE_FAILURE
              value: "1"
            - name: CONTINUE_ON_TRAFFIC_FAILURE
              value: "1"
            - name: TEMPORAL_API_KEY_SECRET_NAME
              value: "__TEMPORAL_API_KEY_SECRET_NAME__"
            - name: TEMPORAL_API_KEY_SECRET_KEY
              value: "__TEMPORAL_API_KEY_SECRET_KEY__"
            - name: TEMPORAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: __TEMPORAL_API_KEY_SECRET_NAME__
                  key: __TEMPORAL_API_KEY_SECRET_KEY__
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi