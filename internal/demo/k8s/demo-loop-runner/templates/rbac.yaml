---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rainbow-demo-runner
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.roleArn | quote }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rainbow-demo-runner
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "pods/log", "secrets", "services", "serviceaccounts", "nodes", "events"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["temporal.io"]
    resources: ["temporalconnections", "temporalworkerdeployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rainbow-demo-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rainbow-demo-runner
subjects:
  - kind: ServiceAccount
    name: rainbow-demo-runner
    namespace: {{ .Release.Namespace }}
