apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: worker-controller
build:
  tagPolicy:
    gitCommit:
      variant: CommitSha
      ignoreChanges: true
profiles:
  # Build and deploy the controller to the local k8s cluster  
  - name: worker-controller
    build:
      tagPolicy:
        envTemplate:
          template: "latest"
      artifacts:
        - image: temporal-worker-controller
          context: .
          docker:
            dockerfile: Dockerfile
    manifests:
      helm:
        releases:
          - name: cert-manager
            remoteChart: cert-manager
            repo: https://charts.jetstack.io
            version: v1.20.0
            namespace: cert-manager
            createNamespace: true
            wait: true
            setValues:
              crds.enabled: true
          - name: temporal-worker-controller-crds
            chartPath: helm/temporal-worker-controller-crds
            namespace: temporal-system
            createNamespace: true
          - name: temporal-worker-controller
            chartPath: helm/temporal-worker-controller
            namespace: temporal-system
            createNamespace: true
            setValues:
              image.repository: temporal-worker-controller
              image.tag: latest
              image.pullPolicy: Always
              namespace.create: true
              certmanager.install: false
            valuesFiles:
              - helm/temporal-worker-controller/values.yaml

  # Build and deploy the helloworld Custom Resource to the local k8s cluster  
  - name: helloworld-worker
    build:
      artifacts:
        - image: helloworld
          context: internal/demo
          docker:
            dockerfile: Dockerfile
            buildArgs:
              DD_GIT_COMMIT_SHA: "{{ .IMAGE_TAG }}"
              DD_GIT_REPOSITORY_URL: "github.com/temporalio/temporal-worker-controller"
              WORKER: "helloworld"
    manifests:
      helm:
        releases:
          - name: helloworld
            chartPath: internal/demo/helloworld/helm/helloworld
            setValueTemplates:
              image.repository: "{{ .IMAGE_REPO_helloworld }}"
              image.tag: "{{ .IMAGE_TAG_helloworld }}"
              # These connection settings are meant to be defined in skaffold.env (see skaffold.example.env)
              temporal.namespace: "{{ .TEMPORAL_NAMESPACE }}"
              temporal.address: "{{ .TEMPORAL_ADDRESS }}"
              temporal.mtlsSecretName: "{{ .TEMPORAL_MTLS_SECRET_NAME }}"
              temporal.apiKey.name: "{{ .TEMPORAL_API_KEY_SECRET_NAME }}"
              temporal.apiKey.key: "{{ .TEMPORAL_API_KEY_SECRET_KEY }}"
            valuesFiles:
              - internal/demo/helloworld/helm/helloworld/values.yaml

  # Build and deploy the rainbow dashboard (API + UI)
  - name: dashboard
    build:
      artifacts:
        - image: rainbow-dashboard-api
          context: .
          docker:
            dockerfile: internal/demo/Dockerfile.dashboard
        - image: rainbow-dashboard-ui
          context: internal/demo/dashboard
          docker:
            dockerfile: Dockerfile
            buildArgs:
              VITE_API_BASE_URL: ""
    manifests:
      rawYaml:
        - internal/demo/k8s/dashboard-deployment.yaml



  # Architecture override profile for EKS/x86_64 clusters.
  # Use in combination with another profile, e.g. --profile worker-controller,eks-amd64
  - name: eks-amd64
    build:
      platforms:
        - linux/amd64

  # Architecture override profile for EKS/arm64 clusters.
  # Use in combination with another profile, e.g. --profile worker-controller,eks-arm64
  - name: eks-arm64
    build:
      platforms:
        - linux/arm64

  # Deploy the demo loop runner that continuously releases new helloworld versions
  - name: demo-loop-runner
    build:
      artifacts:
        - image: rainbow-release-job
          context: .
          docker:
            dockerfile: internal/demo/Dockerfile.release-job
    manifests:
      helm:
        releases:
          - name: demo-loop-runner
            chartPath: internal/demo/k8s/demo-loop-runner
            setValueTemplates:
              image.repository: "{{ .IMAGE_REPO_rainbow_release_job }}"
              image.tag: "{{ .IMAGE_TAG_rainbow_release_job }}"
              temporal.address: "{{ .TEMPORAL_ADDRESS }}"
              temporal.namespace: "{{ .TEMPORAL_NAMESPACE }}"
              temporal.apiKey.secretName: "{{ .TEMPORAL_API_KEY_SECRET_NAME }}"
              temporal.apiKey.secretKey: "{{ .TEMPORAL_API_KEY_SECRET_KEY }}"
            setValues:
              aws.roleArn: arn:aws:iam::025066239481:role/rainbow-version-generator-role
              aws.region: us-east-2
              release.name: helloworld
              release.intervalSeconds: "90"
              release.repoUrl: https://github.com/shashwatsuri/temporal-worker-controller
              release.repoRef: main
              release.worker: helloworld
              temporal.workerDeployment: default/helloworld
            valuesFiles:
              - internal/demo/k8s/demo-loop-runner/values.yaml

deploy:
  helm:
    hooks:
      before:
        - host:
            command: ["sh", "-c", "[ -f ./internal/demo/scripts/update_chart_version.sh ] && ./internal/demo/scripts/update_chart_version.sh || true"]
        # Adopt any existing temporal CRDs into the temporal-worker-controller-crds Helm release.
        # This is a no-op on a fresh cluster (CRDs not found → silently ignored).
        # On a cluster with pre-existing CRDs (e.g. installed via kubectl or an older chart),
        # this sets the Helm ownership labels/annotations so that `helm install` can proceed.
        - host:
            command:
              - sh
              - -c
              - "kubectl label crd temporalconnections.temporal.io temporalworkerdeployments.temporal.io workerresourcetemplates.temporal.io app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true"
        - host:
            command:
              - sh
              - -c
              - "kubectl annotate crd temporalconnections.temporal.io temporalworkerdeployments.temporal.io workerresourcetemplates.temporal.io meta.helm.sh/release-name=temporal-worker-controller-crds meta.helm.sh/release-namespace=temporal-system --overwrite 2>/dev/null || true"
      after:
        - host:
            command: ["sh", "-c", "sed -i.bak 's/^appVersion: .*/appVersion: \"automated\"/' internal/demo/helloworld/helm/helloworld/Chart.yaml && rm -f internal/demo/helloworld/helm/helloworld/Chart.yaml.bak"]
resourceSelector:
  allow:
    - groupKind: "TemporalWorkerDeployment.temporal.io"
      image: [".*"]
